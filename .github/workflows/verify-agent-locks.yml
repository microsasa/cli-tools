name: Verify Agent Locks

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/**/*.md"
      - ".github/workflows/*.lock.yml"
      - ".github/workflows/verify-agent-locks.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install gh-aw extension
        uses: github/gh-aw/actions/setup-cli@4d44d0e89851a877f4ddc0cb6c0197e42b1016c5 # v0.73.0
        with:
          version: v0.68.7

      - name: Recompile all agentic workflows
        run: gh aw compile

      - name: Verify lock files are up to date
        run: |
          if ! git diff --exit-code -- .github/workflows/*.lock.yml; then
            echo "::error::Lock files are out of date or have been modified outside of 'gh aw compile'."
            echo "Run 'gh aw compile' locally and commit the resulting .lock.yml changes."
            exit 1
          fi

          untracked_locks="$(git ls-files --others --exclude-standard -- '.github/workflows/*.lock.yml')"
          if [ -n "$untracked_locks" ]; then
            echo "::error::Lock files are missing from the commit:"
            echo "$untracked_locks"
            echo "Run 'gh aw compile' locally, add the new .lock.yml files, and commit them."
            exit 1
          fi

          echo "All lock files match their sources."
