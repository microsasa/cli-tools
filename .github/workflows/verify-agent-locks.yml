name: Verify Agent Locks

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/**/*.md"
      - ".github/workflows/*.lock.yml"
      - ".github/workflows/verify-agent-locks.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install gh-aw extension
        uses: github/gh-aw/actions/setup-cli@f916d5de5199f770e46151d455ab1f0288981cc9 # v0.68.7
        with:
          version: v0.68.7

      - name: Recompile all agentic workflows
        run: gh aw compile

      - name: Verify lock files are up to date
        run: |
          if ! git diff --exit-code -- .github/workflows/*.lock.yml; then
            echo "::error::Lock files are out of date or have been modified outside of 'gh aw compile'."
            echo "Run 'gh aw compile' locally and commit the resulting .lock.yml changes."
            exit 1
          fi
          echo "All lock files match their sources."
