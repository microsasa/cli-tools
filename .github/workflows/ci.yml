name: CI
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
      - run: uv sync
      - run: make ci
      - name: Check diff coverage (new/changed lines ≥ 90%)
        run: uv run diff-cover coverage.xml --compare-branch=origin/main --fail-under=90
